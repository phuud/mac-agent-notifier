name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: ./scripts/build-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Read sha256
        id: hash
        run: echo "sha256=$(cat dist/SHA256)" >> "$GITHUB_OUTPUT"

      - name: Update Cask
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.hash.outputs.sha256 }}"
          /usr/bin/sed -i '' \
            -e "s|^  version \".*\"$|  version \"$VERSION\"|" \
            -e "s|^  sha256 .*$|  sha256 \"$SHA\"|" \
            Casks/mac-agent-notifier.rb

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mac-agent-notifier.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
          else
            git commit -m "cask: bump to v$VERSION"
            git push origin HEAD:main
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Agent-Notifier-*.dmg
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            brew tap phuud/mac-agent-notifier https://github.com/phuud/mac-agent-notifier
            brew install --cask mac-agent-notifier
            ```

            SHA256: `${{ steps.hash.outputs.sha256 }}`
